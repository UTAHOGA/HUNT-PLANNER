<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U.O.G.A. Google DWR Mirror Test</title>
  <style>
    :root {
      --bg: #f4efe4;
      --panel: rgba(255, 251, 244, 0.97);
      --panel2: #fffdf8;
      --line: #c9a27f;
      --text: #2b1c12;
      --muted: #6b5646;
      --accent: #bf6b34;
      --accent-dark: #9e5323;
      --shadow: 0 10px 28px rgba(58, 37, 18, 0.16);
      --font-display: Georgia, "Times New Roman", serif;
      --font-ui: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }
    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(244, 239, 228, 0.9);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .elk-loader {
      position: relative;
      width: 210px;
      height: 190px;
      margin-bottom: 14px;
    }

    .wheel {
      position: absolute;
      top: 0;
      left: 50%;
      width: 150px;
      height: 150px;
      transform: translateX(-50%);
      border: 7px solid #dfd2c0;
      border-top-color: #c96b33;
      border-right-color: #c07a44;
      border-radius: 50%;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.4),
        0 10px 20px rgba(58, 37, 18, 0.14);
      animation: elk-wheel-spin 1.05s linear infinite;
    }

    .spoke {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 58px;
      margin-left: -2px;
      margin-top: -58px;
      background: rgba(130, 93, 63, 0.36);
      border-radius: 999px;
      transform-origin: 50% 100%;
    }

    .spoke-1 { transform: rotate(0deg); }
    .spoke-2 { transform: rotate(45deg); }
    .spoke-3 { transform: rotate(90deg); }
    .spoke-4 { transform: rotate(135deg); }

    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #c96b33;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.28);
    }

    .stand {
      position: absolute;
      left: 50%;
      top: 106px;
      width: 160px;
      height: 76px;
      transform: translateX(-50%);
    }

    .upright {
      position: absolute;
      top: 0;
      width: 7px;
      height: 58px;
      background: linear-gradient(180deg, #7d5a3e, #5c412d);
      border-radius: 999px;
      box-shadow: 0 4px 8px rgba(58, 37, 18, 0.12);
    }

    .upright.left { left: 42px; transform: rotate(14deg); }
    .upright.right { right: 42px; transform: rotate(-14deg); }

    .base {
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #7d5a3e, #5c412d);
      box-shadow: 0 5px 10px rgba(58, 37, 18, 0.14);
    }

    .elk {
      position: absolute;
      left: 50%;
      top: 53px;
      width: 106px;
      height: 74px;
      transform: translateX(-50%);
      animation: elk-bob 0.42s ease-in-out infinite;
    }

    .elk .body { position: absolute; left: 18px; top: 20px; width: 54px; height: 25px; background: #5b3c28; border-radius: 24px 20px 18px 18px; }
    .elk .shoulder { position: absolute; left: 50px; top: 17px; width: 16px; height: 18px; background: #65432e; border-radius: 12px; }
    .elk .neck { position: absolute; left: 64px; top: 6px; width: 13px; height: 27px; background: #5b3c28; border-radius: 10px; transform: rotate(-15deg); }
    .elk .head { position: absolute; left: 72px; top: 2px; width: 19px; height: 13px; background: #5b3c28; border-radius: 8px 10px 7px 7px; transform: rotate(-8deg); }
    .elk .ear { position: absolute; left: 80px; top: -3px; width: 7px; height: 8px; background: #5b3c28; border-radius: 3px 3px 0 0; transform: rotate(12deg); }
    .elk .muzzle { position: absolute; left: 87px; top: 7px; width: 11px; height: 7px; background: #6d4a34; border-radius: 0 6px 6px 0; }
    .elk .tail { position: absolute; left: 15px; top: 22px; width: 12px; height: 5px; background: #5b3c28; border-radius: 4px; transform: rotate(20deg); }
    .antlers { position: absolute; top: -13px; width: 3px; height: 20px; background: #5b3c28; border-radius: 999px; }
    .antler-left { left: 76px; transform: rotate(-18deg); }
    .antler-right { left: 84px; transform: rotate(18deg); }
    .antler-left::before, .antler-left::after, .antler-right::before, .antler-right::after { content: ""; position: absolute; width: 3px; height: 9px; background: #5b3c28; border-radius: 999px; }
    .antler-left::before { top: 2px; left: -5px; transform: rotate(-38deg); }
    .antler-left::after { top: 8px; left: -4px; transform: rotate(-22deg); }
    .antler-right::before { top: 2px; left: 5px; transform: rotate(38deg); }
    .antler-right::after { top: 8px; left: 4px; transform: rotate(22deg); }
    .leg { position: absolute; width: 5px; height: 24px; top: 41px; background: #5b3c28; border-radius: 999px; transform-origin: 50% 0; }
    .leg-front-back { left: 56px; animation: elk-leg-a 0.42s ease-in-out infinite; }
    .leg-front-front { left: 67px; animation: elk-leg-b 0.42s ease-in-out infinite; }
    .leg-rear-back { left: 31px; animation: elk-leg-b 0.42s ease-in-out infinite; }
    .leg-rear-front { left: 42px; animation: elk-leg-a 0.42s ease-in-out infinite; }

    .shadow { position: absolute; left: 24px; bottom: 4px; width: 56px; height: 8px; background: rgba(58, 37, 18, 0.12); border-radius: 50%; filter: blur(1px); animation: elk-shadow 0.42s ease-in-out infinite; }
    .dust { position: absolute; bottom: 7px; width: 6px; height: 6px; border-radius: 50%; background: rgba(201, 107, 51, 0.26); opacity: 0; }
    .dust-1 { left: 18px; animation: elk-dust 0.9s linear infinite; }
    .dust-2 { left: 26px; animation: elk-dust 0.9s linear infinite 0.18s; }
    .dust-3 { left: 34px; animation: elk-dust 0.9s linear infinite 0.36s; }

    .loading-text { font-family: Georgia, "Times New Roman", serif; font-size: 21px; color: #7d4320; font-weight: 700; letter-spacing: 0.04em; text-align: center; padding: 0 18px; }
    .loading-sub { margin-top: 6px; font-size: 12px; color: #6b5646; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }

    @keyframes elk-wheel-spin { to { transform: translateX(-50%) rotate(360deg); } }
    @keyframes elk-bob { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(1.5px); } }
    @keyframes elk-leg-a { 0%, 100% { transform: rotate(28deg); } 50% { transform: rotate
